name: Publish TidyLangChain

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++

      - name: Build the static library
        run: |
          make clean
          make -j$(nproc)

      - name: Prepare package directory
        id: prep
        run: |
          VERSION=${{ github.ref_name }}
          # 转换为小写，因为 GHCR 不接受大写
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          FILENAME="tidylangchain-${VERSION}.tar.gz"
          
          mkdir -p tidy-package/include
          cp libtidylangchain.a tidy-package/
          cp -r include/* tidy-package/include/ || true
          
          tar -czf "$FILENAME" -C tidy-package .
          sha256sum "$FILENAME" > "${FILENAME}.sha256"
          
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "sha_file=${FILENAME}.sha256" >> $GITHUB_OUTPUT
          echo "repo_lc=$REPO_LOWER" >> $GITHUB_OUTPUT

      # 1. 上传到 Release (你已经成功的这部分)
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.prep.outputs.filename }}
            ${{ steps.prep.outputs.sha_file }}

      # 2. 上传到 GitHub Packages (让 Packages 页面出现内容)
      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to GitHub Packages
        run: |
          VERSION=${{ github.ref_name }}
          REPO=${{ steps.prep.outputs.repo_lc }}
          FILE=${{ steps.prep.outputs.filename }}
          
          # 这行命令会将文件推送到 Packages 页面
          oras push ghcr.io/${REPO}:${VERSION} \
            --artifact-type application/vnd.tidylangchain.package.v1 \
            ${FILE}:application/gzip
